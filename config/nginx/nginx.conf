events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream services (uncomment when services are ready)
    # upstream backend {
    #     server bunkerm-backend:1000;
    # }
    
    # upstream frontend {
    #     server bunkerm-frontend:3000;
    # }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Client body size limit (for file uploads)
        client_max_body_size 100M;

        # Root location - placeholder
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html>
<head>
    <title>BunkerM Extended</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        h2 { color: #764ba2; font-size: 1.2em; }
        .status { 
            margin: 20px 0; 
            padding: 15px; 
            background: #f0f0f0; 
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }
        .success { border-left-color: #4CAF50; }
        .warning { border-left-color: #FF9800; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; }
        li:last-child { border-bottom: none; }
        .footer { 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 2px solid #eee; 
            text-align: center;
            color: #999;
        }
        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BunkerM Extended</h1>
        <h2>MQTT Broker Management Platform</h2>
        
        <div class="status success">
            [OK] Nginx reverse proxy is running
        </div>
        
        <div class="status warning">
            [WARNING] Backend and frontend services are not configured yet
        </div>
        
        <h3>Setup Instructions:</h3>
        <ul>
            <li>1. Configure BunkerM source code in the project directory</li>
            <li>2. Uncomment backend and frontend services in <code>docker-compose.dev.yml</code></li>
            <li>3. Build and start all services: <code>docker-compose -f docker-compose.dev.yml up -d</code></li>
            <li>4. Access the UI at <code>http://localhost:2000</code></li>
        </ul>
        
        <h3>Available Services:</h3>
        <ul>
            <li>PostgreSQL: <code>localhost:5432</code></li>
            <li>Mosquitto MQTT: <code>localhost:1900</code></li>
            <li>pgAdmin: <code>localhost:5050</code> (with --profile tools)</li>
        </ul>
        
        <div class="footer">
            Phase 1: Environment Setup [En progreso]<br>
            See <strong>ROADMAP.md</strong> for full project plan
        </div>
    </div>
</body>
</html>';
        }

