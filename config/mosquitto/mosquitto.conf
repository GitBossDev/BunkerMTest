# ==========================================
# BunkerM Extended - Mosquitto Standalone
# ==========================================
# Paths use /var/lib/mosquitto, /var/log/mosquitto, /etc/mosquitto — the same
# paths that both this container and the BunkerM container share via named
# Docker volumes. Do NOT change them to /mosquitto/data etc.

# ------------------------------------------
# Persistence
# ------------------------------------------
persistence true
persistence_location /var/lib/mosquitto
persistence_file mosquitto.db
autosave_interval 300

# ------------------------------------------
# Logging
# ------------------------------------------
log_dest file /var/log/mosquitto/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
connection_messages true

# ------------------------------------------
# Default Listener (MQTT)
# ------------------------------------------
listener 1900 0.0.0.0
protocol mqtt
max_connections -1
per_listener_settings false
allow_anonymous false

# ------------------------------------------
# WebSocket Listener
# ------------------------------------------
listener 9001 0.0.0.0
protocol websockets
max_connections -1

# ------------------------------------------
# Dynamic Security Plugin
# ------------------------------------------
# Handles authentication and ACL at runtime without broker restart.
# The JSON file is on the shared mosquitto-data volume so both this
# container and BunkerM's config-api can access it.
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /var/lib/mosquitto/dynamic-security.json

# ------------------------------------------
# Custom conf.d (bridges written by aws-bridge / azure-bridge APIs)
# ------------------------------------------
include_dir /etc/mosquitto/conf.d

# ------------------------------------------
# Message Size & QoS
# ------------------------------------------
message_size_limit 10485760
max_queued_messages 1000
max_inflight_messages 20
max_keepalive 65535

# ------------------------------------------
# Performance
# ------------------------------------------
sys_interval 10

# ------------------------------------------
# TLS/SSL (uncomment and configure as needed)
# ------------------------------------------
# listener 8883
# cafile /etc/mosquitto/certs/ca.crt
# certfile /etc/mosquitto/certs/server.crt
# keyfile /etc/mosquitto/certs/server.key
# require_certificate false
