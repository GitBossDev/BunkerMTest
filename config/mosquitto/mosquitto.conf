# ==========================================
# BunkerM Extended - Mosquitto Configuration
# ==========================================

# Persistence
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection logging
connection_messages true

# ------------------------------------------
# Default Listener (MQTT)
# ------------------------------------------
listener 1883 0.0.0.0
protocol mqtt
max_connections -1

# ------------------------------------------
# WebSocket Listener
# ------------------------------------------
listener 9001 0.0.0.0
protocol websockets
max_connections -1

# ------------------------------------------
# Dynamic Security Plugin
# ------------------------------------------
# This enables runtime ACL management without broker restart
# DISABLED for development - allows anonymous connections
# plugin /usr/lib/mosquitto_dynamic_security.so
# plugin_opt_config_file /mosquitto/dynamic-security.json

# ------------------------------------------
# Security Settings
# ------------------------------------------
# Allow anonymous connections (disable in production)
allow_anonymous true

# ------------------------------------------
# Message Size Limits
# ------------------------------------------
message_size_limit 10485760  # 10MB max message size

# ------------------------------------------
# Quality of Service (QoS)
# ------------------------------------------
max_queued_messages 1000
max_queued_bytes 0  # No limit

# ------------------------------------------
# Retained Messages
# ------------------------------------------
max_inflight_messages 20
max_keepalive 65535

# ------------------------------------------
# Performance Tuning
# ------------------------------------------
# Adjust these based on your hardware and load
sys_interval 10

# ------------------------------------------
# Additional Options
# ------------------------------------------
# Uncomment for TLS/SSL support
# listener 8883
# cafile /mosquitto/config/ca.crt
# certfile /mosquitto/config/server.crt
# keyfile /mosquitto/config/server.key
# require_certificate false
