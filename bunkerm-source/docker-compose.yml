version: '3.8'

services:
  bunkerm:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        - NEXT_PUBLIC_API_KEY=${API_KEY:-default_api_key_replace_in_production}
    ports:
      - "1900:1900"  # MQTT port
      - "2000:2000"  # Web UI (nginx → Next.js)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./default-next.conf:/etc/nginx/conf.d/default.conf
      - ./backend/mosquitto/config/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro
      - ./backend/app:/app
      - ./backend/logs:/var/log/mosquitto
      - ./backend/logs/api:/var/log/api
      - ./ssl_certificates:/app/certs
      - ./backend/etc/mosquitto/certs:/etc/mosquitto/certs
      - ./backend/etc/mosquitto/conf.d:/etc/mosquitto/conf.d
      - next_data:/nextjs/data  # Persistent user accounts (Next.js auth)
      - monitor_data:/app/monitor/data  # Persistent broker stats (7-day history)
    environment:
      # MQTT Settings
      - MQTT_BROKER=localhost
      - MQTT_PORT=1900
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-Usuario@1}
      # Backend API Security (CHANGE THESE in production — see .env.example)
      - JWT_SECRET=${JWT_SECRET:-default_jwt_secret_replace_in_production}
      - API_KEY=${API_KEY:-default_api_key_replace_in_production}
      # Next.js Auth Secret (CHANGE THIS in production)
      - AUTH_SECRET=${AUTH_SECRET:-bunkerm-secret-please-change-in-production}
      # App Settings
      - FRONTEND_URL=http://localhost:2000
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - RATE_LIMIT_PER_MINUTE=100
      # Logging
      - LOG_LEVEL=INFO
      - API_LOG_FILE=/var/log/api/api_activity.log
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - CLIENT_LOG_PATH=/var/log/api/api_activity.log
      # Paths
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      - MAX_UPLOAD_SIZE=10485760
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
      # Smart-anomaly (SQLite — no external DB required)
      - DATABASE_URL=sqlite+aiosqlite:////nextjs/data/smart-anomaly.db
      # ── Alert thresholds (adjust per project/industry) ──────────────────────
      # Broker offline: notify after this many consecutive failed polls (×10 s)
      - ALERT_BROKER_DOWN_GRACE_POLLS=${ALERT_BROKER_DOWN_GRACE_POLLS:-3}
      # Latency: alert when round-trip to broker exceeds this value (ms)
      - ALERT_LATENCY_HIGH_MS=${ALERT_LATENCY_HIGH_MS:-500}
      # Client capacity: alert when connected clients exceed this % of max_connections
      - ALERT_CLIENT_CAPACITY_PCT=${ALERT_CLIENT_CAPACITY_PCT:-80}
      # Default max_connections assumed when broker config is unavailable
      - ALERT_CLIENT_MAX_DEFAULT=${ALERT_CLIENT_MAX_DEFAULT:-10000}
      # Message spike: alert when 1-min msg rate exceeds baseline by this multiplier
      - ALERT_MSG_SPIKE_FACTOR=${ALERT_MSG_SPIKE_FACTOR:-5}
      # In-flight messages: alert when queue exceeds this count (0 = disabled)
      - ALERT_INFLIGHT_MAX=${ALERT_INFLIGHT_MAX:-500}
      # Reconnect loop: alert when a client connects/disconnects more than N times
      - ALERT_RECONNECT_LOOP_COUNT=${ALERT_RECONNECT_LOOP_COUNT:-5}
      # Reconnect loop: within this time window (seconds)
      - ALERT_RECONNECT_LOOP_WINDOW_S=${ALERT_RECONNECT_LOOP_WINDOW_S:-60}
      # Auth failures: alert after this many failed attempts in the window below
      - ALERT_AUTH_FAIL_COUNT=${ALERT_AUTH_FAIL_COUNT:-5}
      # Auth failures: time window (seconds)
      - ALERT_AUTH_FAIL_WINDOW_S=${ALERT_AUTH_FAIL_WINDOW_S:-60}
      # Anomaly detection sigma threshold (z-score; higher = fewer alerts)
      - ANOMALY_SIGMA_THRESHOLD=${ANOMALY_SIGMA_THRESHOLD:-3.0}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  next_data:
    driver: local
  monitor_data:
    driver: local
