[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

# mosquitto daemon removed — now runs as standalone container (bunkerm-mosquitto)
# BunkerM connects to it via MOSQUITTO_IP=mosquitto on the Docker network.

# Backend unificado — reemplaza los 7 microservicios anteriores (puertos 1000-1005 y 8100).
# Puerto único: 9001.
[program:bunkerm-api]
command=/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 9001
directory=/app
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/bunkerm-api.err.log
stdout_logfile=/var/log/supervisor/bunkerm-api.out.log
user=root
environment=PYTHONPATH="/app:/app/smart-anomaly",BUNKERM_API_KEY="%(ENV_API_KEY)s"
priority=20

[program:nextjs-frontend]
command=node /nextjs/server.js
directory=/nextjs
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/nextjs.err.log
stdout_logfile=/var/log/supervisor/nextjs.out.log
user=root
environment=PORT="3000",HOSTNAME="127.0.0.1",NODE_ENV="production"
priority=25

[program:nginx]
command=nginx -g 'daemon off;'
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/nginx.err.log
stdout_logfile=/var/log/supervisor/nginx.out.log
user=root
priority=30
