# version obsoleta eliminada (Compose v2 no la requiere)

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: bunkerm-postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Named volume para datos (evita problemas de permisos en Podman rootless)
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bunkerm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Eclipse Mosquitto MQTT Broker
  # ==========================================
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: bunkerm-mosquitto
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "${MQTT_PORT:-1900}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      # Named volumes para datos (evita problemas de permisos en Podman rootless)
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      # Config y dynamic-security como bind mount read-only
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/mosquitto/dynamic-security.json:/mosquitto/dynamic-security.json
    networks:
      - bunkerm-network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Mosquitto no depende de postgres

  # ==========================================
  # BunkerM Backend Services (Build from source)
  # ==========================================
  # Note: This assumes BunkerM source code is in the current directory
  # You may need to adjust the build context and Dockerfile path
  
  # Placeholder for BunkerM backend
  # Uncomment and configure once BunkerM source is properly set up
  # bunkerm-backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   container_name: bunkerm-backend
  #   restart: unless-stopped
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - MQTT_BROKER=${MQTT_BROKER}
  #     - MQTT_PORT=${MQTT_PORT}
  #     - MQTT_USERNAME=${MQTT_USERNAME}
  #     - MQTT_PASSWORD=${MQTT_PASSWORD}
  #     - API_KEY=${API_KEY}
  #     - JWT_SECRET=${JWT_SECRET}
  #     - AUTH_SECRET=${AUTH_SECRET}
  #     - TIER=${TIER}
  #     - DYNSEC_PATH=${DYNSEC_PATH}
  #   ports:
  #     - "${DYNSEC_PORT:-1000}:1000"
  #     - "${MONITOR_PORT:-1001}:1001"
  #     - "${CLIENTLOGS_PORT:-1002}:1002"
  #     - "${AWS_BRIDGE_PORT:-1003}:1003"
  #     - "${AZURE_BRIDGE_PORT:-1004}:1004"
  #     - "${CONFIG_PORT:-1005}:1005"
  #     - "${SMART_ANOMALY_PORT:-8100}:8100"
  #   volumes:
  #     - ./data/logs/api:/var/log/api
  #     - ./data/mosquitto:/var/lib/mosquitto
  #   networks:
  #     - bunkerm-network
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     mosquitto:
  #       condition: service_healthy

  # ==========================================
  # BunkerM Frontend (Next.js)
  # ==========================================
  # bunkerm-frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: bunkerm-frontend
  #   restart: unless-stopped
  #   environment:
  #     - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
  #     - NEXTAUTH_URL=${NEXTAUTH_URL}
  #     - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - bunkerm-network
  #   depends_on:
  #     - bunkerm-backend

  # ==========================================
  # BunkerM - Plataforma IoT Completa
  # ==========================================
  bunkerm:
    build:
      context: ./bunkerm-source
      dockerfile: Dockerfile.next
      args:
        # API key para Next.js en tiempo de build
        - NEXT_PUBLIC_API_KEY=${API_KEY:-default_api_key_replace_in_production}
    container_name: bunkerm-platform
    restart: unless-stopped
    environment:
      # MQTT interno (BunkerM gestiona su propio mosquitto)
      - MQTT_BROKER=localhost
      - MQTT_PORT=1900
      - MQTT_USERNAME=${MQTT_USERNAME:-bunker}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-bunker}
      # Seguridad (secrets generados por generate-secrets.py)
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      # URLs
      - FRONTEND_URL=http://localhost:2000
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - RATE_LIMIT_PER_MINUTE=100
      # Logging
      - LOG_LEVEL=INFO
      - API_LOG_FILE=/var/log/api/api_activity.log
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - CLIENT_LOG_PATH=/var/log/api/api_activity.log
      # Paths internos de BunkerM
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      - MAX_UPLOAD_SIZE=10485760
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
    ports:
      # UI accesible en http://localhost:2000
      - "2000:2000"
      # MQTT interno (1901 para no colisionar con bunkerm-mosquitto en 1900)
      - "1901:1900"
      # APIs Backend
      - "1000:1000"  # Dynsec API
      - "1001:1001"  # Monitor API
      - "1002:1002"  # Client Logs
      - "1003:1003"  # AWS Bridge
      - "1004:1004"  # Azure Bridge
      - "1005:1005"  # Config API
      - "8100:8100"  # Smart Anomaly
    volumes:
      # Named volumes para datos de BunkerM
      - bunkerm-nextjs:/nextjs/data
      - bunkerm-mosquitto:/var/lib/mosquitto
      - bunkerm-logs-api:/var/log/api
      - bunkerm-logs-mosquitto:/var/log/mosquitto
      - bunkerm-logs-nginx:/var/log/nginx
    networks:
      - bunkerm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # Nginx Reverse Proxy - DESACTIVADO
  # BunkerM ya incluye su propio nginx interno en el puerto 2000.
  # Se reactivara en Fase 3-4 cuando se agreguen microservicios propios.
  # ==========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: bunkerm-nginx
  #   ...

  # ==========================================
  # pgAdmin (Optional - for database management)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bunkerm-pgadmin
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      # Named volume para pgAdmin (evita problemas de permisos en Podman rootless)
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - bunkerm-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

networks:
  bunkerm-network:
    name: bunkerm-network
    driver: bridge

volumes:
  # Datos de servicios base
  postgres-data:
  mosquitto-data:
  mosquitto-log:
  pgadmin-data:
  # Datos de BunkerM platform
  bunkerm-nextjs:
  bunkerm-mosquitto:
  bunkerm-logs-api:
  bunkerm-logs-mosquitto:
  bunkerm-logs-nginx:
