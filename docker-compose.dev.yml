# version obsoleta eliminada (Compose v2 no la requiere)
#
# ARQUITECTURA: Broker standalone + BunkerM
#
#   ┌──────────────────────────────────────────────────────────────────┐
#   │  bunkerm-network                                                 │
#   │                                                                  │
#   │  ┌─────────────────────────┐    ┌───────────────────────────┐   │
#   │  │   bunkerm-platform      │───▶│   bunkerm-mosquitto        │   │◀── Dispositivos / App procesamiento
#   │  │   (UI + APIs + Next.js) │    │   (broker MQTT standalone) │   │    (puerto 1900)
#   │  └─────────────────────────┘    └───────────────────────────┘   │
#   └──────────────────────────────────────────────────────────────────┘
#
# El broker sobrevive reinicios del monolito BunkerM (ciclos de vida independientes).
# Volúmenes compartidos (mismas rutas en ambos contenedores):
#   mosquitto-data  → /var/lib/mosquitto  (DynSec JSON, persistencia)
#   mosquitto-conf  → /etc/mosquitto      (mosquitto.conf + conf.d/)
#   mosquitto-log   → /var/log/mosquitto  (logs leídos por clientlogs)
#
# Para desarrollar nuevas funcionalidades:
#   - Backend: editar bunkerm-source/backend/app/
#   - Frontend: editar bunkerm-source/frontend/
#   - Rebuild BunkerM:  .\deploy.ps1 -Action build
#   - Rebuild mosquitto: .\deploy.ps1 -Action build-mosquitto

services:
  # ==========================================
  # PostgreSQL - Reservado para Fase 3-4
  # BunkerM usa SQLite internamente. Este postgres es para los
  # nuevos microservicios propios que se desarrollen en Fase 3-4.
  # Para activarlo: .\deploy.ps1 -Action start -WithTools
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: bunkerm-postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Named volume para datos (evita problemas de permisos en Podman rootless)
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bunkerm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - tools  # Solo inicia con: .\deploy.ps1 -Action start -WithTools

  # ==========================================
  # Mosquitto Standalone - Broker MQTT Independiente
  #
  # Ciclo de vida separado del monolito BunkerM. Los dispositivos y la
  # app de procesamiento conectan aquí directamente (puerto 1900).
  # BunkerM también conecta a este broker para monitorización y DynSec.
  # ==========================================
  mosquitto:
    build:
      context: .
      dockerfile: Dockerfile.mosquitto
    container_name: bunkerm-mosquitto
    restart: unless-stopped
    ports:
      - "1900:1900"   # MQTT (TCP) — dispositivos, clientes externos y app procesamiento
      - "9001:9001"   # MQTT sobre WebSockets (opcional)
    volumes:
      - mosquitto-data:/var/lib/mosquitto   # DynSec JSON + persistencia
      - mosquitto-conf:/etc/mosquitto       # mosquitto.conf + conf.d/
      - mosquitto-log:/var/log/mosquitto    # logs (leídos también por BunkerM/clientlogs)
    networks:
      - bunkerm-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1900 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ==========================================
  # BunkerM - Plataforma IoT Completa (monolito sin broker propio)
  # ==========================================
  bunkerm:
    build:
      context: ./bunkerm-source
      dockerfile: Dockerfile.next
      args:
        # API key para Next.js en tiempo de build
        - NEXT_PUBLIC_API_KEY=${API_KEY:-default_api_key_replace_in_production}
    container_name: bunkerm-platform
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      # MQTT — apunta al contenedor mosquitto standalone en la red interna
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1900
      - MQTT_USERNAME=${MQTT_USERNAME:-bunker}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-bunker}
      # Variables que usan los backends Python para conectarse al broker
      - MOSQUITTO_ADMIN_USERNAME=${MQTT_USERNAME:-bunker}
      - MOSQUITTO_ADMIN_PASSWORD=${MQTT_PASSWORD:-bunker}
      - MOSQUITTO_IP=mosquitto
      - MOSQUITTO_PORT=1900
      # Seguridad (secrets generados por generate-secrets.py)
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      # URLs
      - FRONTEND_URL=http://localhost:2000
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - RATE_LIMIT_PER_MINUTE=100
      # Timezone
      - TZ=${TZ:-Europe/Madrid}
      # Logging
      - LOG_LEVEL=INFO
      - API_LOG_FILE=/var/log/api/api_activity.log
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - CLIENT_LOG_PATH=/var/log/api/api_activity.log
      # Paths internos de BunkerM (compartidos con mosquitto via volúmenes)
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      - MAX_UPLOAD_SIZE=10485760
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
    ports:
      # UI accesible en http://localhost:2000
      - "2000:2000"
      # APIs Backend
      - "1000:1000"  # Dynsec API
      - "1001:1001"  # Monitor API
      - "1002:1002"  # Client Logs
      - "1003:1003"  # AWS Bridge
      - "1004:1004"  # Azure Bridge
      - "1005:1005"  # Config API
      - "8100:8100"  # Smart Anomaly
    volumes:
      # Datos exclusivos de BunkerM
      - bunkerm-nextjs:/nextjs/data
      - bunkerm-logs-api:/var/log/api
      - bunkerm-logs-nginx:/var/log/nginx
      # Volúmenes compartidos con el contenedor mosquitto (mismas rutas)
      - mosquitto-data:/var/lib/mosquitto   # DynSec JSON (config-api lo lee/escribe)
      - mosquitto-conf:/etc/mosquitto       # mosquitto.conf (config-api lo edita)
      - mosquitto-log:/var/log/mosquitto    # logs del broker (clientlogs los parsea)
    networks:
      - bunkerm-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # Nginx Reverse Proxy - DESACTIVADO
  # BunkerM ya incluye su propio nginx interno en el puerto 2000.
  # Se reactivara en Fase 3-4 cuando se agreguen microservicios propios.
  # ==========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: bunkerm-nginx
  #   ...

  # ==========================================
  # pgAdmin (Optional - for database management)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bunkerm-pgadmin
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      # Named volume para pgAdmin (evita problemas de permisos en Podman rootless)
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - bunkerm-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

networks:
  bunkerm-network:
    name: bunkerm-network
    driver: bridge

volumes:
  # Datos de postgres (Fase 3-4)
  postgres-data:
  pgadmin-data:
  # Datos exclusivos de BunkerM platform
  bunkerm-nextjs:
  bunkerm-logs-api:
  bunkerm-logs-nginx:
  # Volúmenes compartidos entre BunkerM y mosquitto standalone
  mosquitto-data:    # /var/lib/mosquitto — DynSec JSON, persistencia MQTT
  mosquitto-conf:    # /etc/mosquitto     — mosquitto.conf + conf.d/
  mosquitto-log:     # /var/log/mosquitto — logs del broker
