apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bhm-lab

labels:
  - pairs:
      app.kubernetes.io/part-of: bhm
      app.kubernetes.io/managed-by: kubectl

resources:
  - namespace.yaml
  - postgres.yaml
  - control-plane.yaml
  - alert-delivery.yaml
  - mosquitto.yaml
  - observability.yaml

configMapGenerator:
  - name: bhm-k8s-config
    literals:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1900
      - MOSQUITTO_IP=mosquitto
      - MOSQUITTO_PORT=1900
      - MOSQUITTO_INTERNAL_HOST=mosquitto-internal
      - MOSQUITTO_INTERNAL_PORT=1901
      - FRONTEND_URL=http://localhost:22000
      - NEXTAUTH_URL=http://localhost:22000
      - NEXT_PUBLIC_API_URL=http://localhost:22000
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - RATE_LIMIT_PER_MINUTE=100
      - TZ=Europe/Madrid
      - LOG_LEVEL=INFO
      - API_LOG_FILE=/var/log/api/api_activity.log
      - CLIENT_LOG_PATH=/var/log/api/api_activity.log
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - BROKER_OBSERVABILITY_ENABLED=true
      - BROKER_OBSERVABILITY_URL=http://bhm-broker-observability:9102
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      - BROKER_RECONCILE_MODE=daemon
      - BROKER_RECONCILE_WAIT_TIMEOUT_SECONDS=12
      - MAX_UPLOAD_SIZE=10485760
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
      - BROKER_RESOURCE_STATS_PATH=/var/log/mosquitto/broker-resource-stats.json
      - BROKER_LOG_READ_ENABLED=true
      - BROKER_RESOURCE_STATS_FILE_ENABLED=true
      - MOSQUITTO_BACKUP_DIR=/var/lib/mosquitto/backups/mosquitto
      - DYNSEC_BACKUP_DIR=/var/lib/mosquitto/backups/dynsec
  - name: postgres-init
    files:
      - init.sql=postgres-init.sql
secretGenerator:
  - name: mosquitto-passwd-bootstrap
    files:
      - mosquitto_passwd=secrets/mosquitto_passwd
  - name: mosquitto-tls-bootstrap
    files:
      - ca.crt=secrets/ca.crt
      - server.crt=secrets/server.crt
      - server.key=secrets/server.key

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: localhost/bunkermtest-bunkerm
    newTag: latest
  - name: localhost/bunkermtest-mosquitto
    newTag: latest
