apiVersion: v1
kind: Service
metadata:
  name: bhm-frontend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: bhm-frontend
  ports:
    - name: http
      port: 2000
      targetPort: http
      nodePort: 32000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bhm-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bhm-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bhm-frontend
    spec:
      containers:
        - name: frontend
          image: localhost/bhm-frontend:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: bhm-env
            - configMapRef:
                name: bhm-k8s-config
          env:
            - name: BACKEND_URL
              value: "http://bhm-api:9001"
          ports:
            - name: http
              containerPort: 2000
          volumeMounts:
            - name: nextjs-data
              mountPath: /nextjs/data
            - name: nginx-logs
              mountPath: /var/log/nginx
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: nextjs-data
          persistentVolumeClaim:
            claimName: nextjs-data
        - name: nginx-logs
          emptyDir: {}
