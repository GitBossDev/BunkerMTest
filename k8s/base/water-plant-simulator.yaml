apiVersion: apps/v1
kind: Deployment
metadata:
  name: water-plant-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: water-plant-simulator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: water-plant-simulator
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: simulator
          image: localhost/water-plant-simulator:latest
          imagePullPolicy: Never
          env:
            - name: MQTT_BROKER
              value: mosquitto
            - name: MQTT_PORT
              value: "1900"
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bhm-env
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bhm-env
                  key: MQTT_PASSWORD
            - name: MQTT_CONNECT_TIMEOUT_SECONDS
              value: "20"
            - name: SIMULATOR_LOG_FILE
              value: /app/logs/simulator.log
            - name: SIMULATOR_STATUS_FILE
              value: /app/status/simulator-status.json
            - name: SIMULATOR_HEARTBEAT_FILE
              value: /app/status/heartbeat.txt
          volumeMounts:
            - name: simulator-config
              mountPath: /app/config/plant_config.yaml
              subPath: plant_config.yaml
              readOnly: true
            - name: simulator-logs
              mountPath: /app/logs
            - name: simulator-status
              mountPath: /app/status
          startupProbe:
            exec:
              command:
                - python
                - -m
                - src.healthcheck
                - --mode
                - liveness
                - --max-heartbeat-age
                - "60"
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - python
                - -m
                - src.healthcheck
                - --mode
                - readiness
                - --max-heartbeat-age
                - "30"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - python
                - -m
                - src.healthcheck
                - --mode
                - liveness
                - --max-heartbeat-age
                - "30"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: simulator-config
          configMap:
            name: water-plant-simulator-config
        - name: simulator-logs
          emptyDir: {}
        - name: simulator-status
          emptyDir: {}