apiVersion: v1
kind: Service
metadata:
  name: bhm-identity
  labels:
    app.kubernetes.io/name: bhm-identity
    app.kubernetes.io/component: identity
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bhm-identity
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bhm-identity
  labels:
    app.kubernetes.io/name: bhm-identity
    app.kubernetes.io/component: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bhm-identity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bhm-identity
        app.kubernetes.io/component: identity
    spec:
      containers:
        - name: identity
          image: localhost/bhm-identity:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: bhm-env
            - configMapRef:
                name: bhm-k8s-config
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 36
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
