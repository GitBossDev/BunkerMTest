apiVersion: v1
kind: Service
metadata:
  name: bunkerm-platform
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: bunkerm-platform
  ports:
    - name: http
      port: 2000
      targetPort: http
      nodePort: 32000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bunkerm-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bunkerm-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bunkerm-platform
    spec:
      containers:
        - name: platform
          image: localhost/bunkermtest-bunkerm:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: bhm-env
            - configMapRef:
                name: bhm-k8s-config
          ports:
            - name: http
              containerPort: 2000
          volumeMounts:
            - name: nextjs-data
              mountPath: /nextjs/data
            - name: api-logs
              mountPath: /var/log/api
            - name: nginx-logs
              mountPath: /var/log/nginx
          startupProbe:
            httpGet:
              path: /api/monitor/health
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/monitor/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/monitor/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: nextjs-data
          emptyDir: {}
        - name: api-logs
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
