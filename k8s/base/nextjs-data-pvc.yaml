apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # PVC para los datos de la plataforma BHM que deben sobrevivir reinicios del pod.
  # Incluye: smart_anomaly.db, api.log, backups de configuracion y uploads.
  # Usado por el Deployment bunkerm-platform como volumen nextjs-data.
  name: nextjs-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
