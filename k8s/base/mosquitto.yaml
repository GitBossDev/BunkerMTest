apiVersion: v1
kind: Service
metadata:
  name: mosquitto-internal
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mqtt
      port: 1900
      targetPort: mqtt
    - name: mqtt-system
      port: 1901
      targetPort: mqtt-system
    - name: websocket
      port: 9001
      targetPort: websocket
    - name: observability
      port: 9102
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mqtt
      port: 1900
      targetPort: mqtt
      nodePort: 31900
    - name: websocket
      port: 9001
      targetPort: websocket
      nodePort: 30901
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mosquitto
spec:
  serviceName: mosquitto-internal
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosquitto
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: broker-secrets-bootstrap
          image: localhost/bunkermtest-mosquitto:latest
          imagePullPolicy: Never
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /etc/mosquitto/certs /var/lib/mosquitto/backups/mosquitto /var/lib/mosquitto/backups/dynsec
              if [ -f /seed/passwd/mosquitto_passwd ]; then
                cp /seed/passwd/mosquitto_passwd /var/lib/mosquitto/mosquitto_passwd
                chmod 0644 /var/lib/mosquitto/mosquitto_passwd
              fi
              if [ -d /seed/certs ]; then
                cp /seed/certs/* /etc/mosquitto/certs/ 2>/dev/null || true
                chmod 0644 /etc/mosquitto/certs/* 2>/dev/null || true
              fi
          volumeMounts:
            - name: mosquitto-data
              mountPath: /var/lib/mosquitto
            - name: mosquitto-conf
              mountPath: /etc/mosquitto
            - name: mosquitto-passwd-bootstrap
              mountPath: /seed/passwd
              readOnly: true
            - name: mosquitto-tls-bootstrap
              mountPath: /seed/certs
              readOnly: true
      containers:
        - name: broker
          image: localhost/bunkermtest-mosquitto:latest
          imagePullPolicy: Never
          env:
            - name: MQTT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bhm-env
                  key: MQTT_USERNAME
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bhm-env
                  key: MQTT_PASSWORD
          ports:
            - name: mqtt
              containerPort: 1900
            - name: mqtt-system
              containerPort: 1901
            - name: websocket
              containerPort: 9001
          volumeMounts:
            - name: mosquitto-data
              mountPath: /var/lib/mosquitto
            - name: mosquitto-conf
              mountPath: /etc/mosquitto
            - name: mosquitto-log
              mountPath: /var/log/mosquitto
          startupProbe:
            tcpSocket:
              port: mqtt
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mqtt
            initialDelaySeconds: 30
            periodSeconds: 20
        - name: reconciler
          image: localhost/bunkermtest-bunkerm:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: bhm-env
            - configMapRef:
                name: bhm-k8s-config
          command:
            - /bin/sh
            - -c
            - /docker-entrypoint.d/config-env.sh && /opt/venv/bin/python -m services.broker_reconcile_daemon --interval 1
          volumeMounts:
            - name: mosquitto-data
              mountPath: /var/lib/mosquitto
            - name: mosquitto-conf
              mountPath: /etc/mosquitto
            - name: api-logs
              mountPath: /var/log/api
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps -ef | grep broker_reconcile_daemon | grep -v grep
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps -ef | grep broker_reconcile_daemon | grep -v grep
            initialDelaySeconds: 30
            periodSeconds: 20
        - name: observability
          image: localhost/bunkermtest-bunkerm:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: bhm-k8s-config
          command:
            - /bin/sh
            - -c
            - /docker-entrypoint.d/config-env.sh && /opt/venv/bin/uvicorn services.broker_observability_api:app --host 0.0.0.0 --port 9102
          ports:
            - name: http
              containerPort: 9102
          volumeMounts:
            - name: mosquitto-data
              mountPath: /var/lib/mosquitto
              readOnly: true
            - name: mosquitto-conf
              mountPath: /etc/mosquitto
              readOnly: true
            - name: mosquitto-log
              mountPath: /var/log/mosquitto
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: api-logs
          emptyDir: {}
        - name: mosquitto-passwd-bootstrap
          secret:
            secretName: mosquitto-passwd-bootstrap
        - name: mosquitto-tls-bootstrap
          secret:
            secretName: mosquitto-tls-bootstrap
  volumeClaimTemplates:
    - metadata:
        name: mosquitto-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    - metadata:
        name: mosquitto-conf
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: mosquitto-log
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi