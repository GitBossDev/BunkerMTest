apiVersion: v1
kind: Service
metadata:
  name: bhm-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bhm-api
  ports:
    - name: http
      port: 9001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bhm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bhm-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bhm-api
    spec:
      containers:
        - name: api
          image: localhost/bhm-api:latest
          imagePullPolicy: Never
          envFrom:
            - secretRef:
                name: bhm-env
            - configMapRef:
                name: bhm-k8s-config
          ports:
            - name: http
              containerPort: 9001
          volumeMounts:
            - name: api-logs
              mountPath: /var/log/api
            - name: mosquitto-conf
              mountPath: /etc/mosquitto
              readOnly: true
          startupProbe:
            httpGet:
              path: /api/v1/monitor/health
              port: http
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/monitor/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/monitor/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 512Mi
      volumes:
        - name: api-logs
          emptyDir: {}
        - name: mosquitto-conf
          persistentVolumeClaim:
            claimName: mosquitto-conf-mosquitto-0
