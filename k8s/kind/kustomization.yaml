apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay especifico para el laboratorio kind local.
# Extiende k8s/base sobreescribiendo los valores que difieren en el entorno de laboratorio.
# Para aplicar directamente: kubectl apply -k k8s/kind
# Para aplicar via script:   .\deploy.ps1 -Action start -Runtime kind -ImageTag <tag>

namespace: bhm-lab

resources:
  - ../base

# Sobreescribe ALLOWED_ORIGINS y ALLOWED_HOSTS con wildcards validos para el laboratorio local.
# En entornos expuestos fuera de localhost estos valores deben restringirse al origen real.
configMapGenerator:
  - name: bhm-k8s-config
    behavior: merge
    literals:
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
