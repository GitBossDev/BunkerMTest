kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 32000
        hostPort: 22000
        protocol: TCP
      - containerPort: 31900
        hostPort: 21900
        protocol: TCP
      - containerPort: 30901
        hostPort: 29001
        protocol: TCP
  - role: worker
