# version obsoleta eliminada (Compose v2 no la requiere)
#
# ARQUITECTURA: Microservicios BHM (Phase 5 final)
#
#   ┌──────────────────────────────────────────────────────────────────────────────┐
#   │  bunkerm-network                                                             │
#   │                                                                              │
#   │  bhm-frontend (:2000)  →  bhm-api (:9001)  →  postgres (:5432)             │
#   │  bhm-frontend (:2000)  →  bhm-identity (:8080)  →  postgres (:5432)        │
#   │  bhm-api (:9001)       →  bunkerm-mosquitto (:1900)                         │
#   │  bhm-reconciler        →  bunkerm-mosquitto + postgres                      │
#   │  bhm-broker-observability → bunkerm-mosquitto (read-only)                  │
#   │  bhm-alert-delivery    →  postgres                                          │
#   └──────────────────────────────────────────────────────────────────────────────┘
#
# Ciclos de vida independientes: el broker y cada servicio se reinician por separado.
# Volumenes compartidos (mismas rutas donde aplica):
#   mosquitto-data  → /var/lib/mosquitto  (DynSec JSON, persistencia)
#   mosquitto-conf  → /etc/mosquitto      (mosquitto.conf + conf.d/)
#   mosquitto-log   → /var/log/mosquitto  (logs leidos por bhm-broker-observability)
#
# Para desarrollar nuevas funcionalidades:
#   - Backend: editar bunkerm-source/backend/app/
#   - Frontend: editar bunkerm-source/frontend/
#   - Rebuild:  .\deploy.ps1 -Action build
#   - Rebuild mosquitto: .\deploy.ps1 -Action build-mosquitto

services:
  # ==========================================
  # PostgreSQL - Baseline de persistencia para la migracion de BHM
  # La adopcion funcional sigue siendo progresiva, pero este servicio
  # ya forma parte del baseline Compose-first de la arquitectura objetivo.
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: bunkerm-postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Named volume para datos (evita problemas de permisos en Podman rootless)
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      bunkerm-network:
        aliases:
          - bhm-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ==========================================
  # Mosquitto Standalone - Broker MQTT Independiente
  #
  # Ciclo de vida separado de la plataforma BHM. Los dispositivos y la
  # app de procesamiento conectan aquí directamente (puerto 1900).
  # BHM conecta a este broker para monitorizacion y gestion transicional.
  # ==========================================
  mosquitto:
    build:
      context: .
      dockerfile: Dockerfile.mosquitto
    container_name: bunkerm-mosquitto
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "1900:1900"   # MQTT (TCP) — dispositivos, clientes externos y app procesamiento
      - "9001:9001"   # MQTT sobre WebSockets (opcional)
    environment:
      # Credentials used by the entrypoint to reconcile admin user on every start
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-Usuario@1}
      - BROKER_CPU_LIMIT_CORES=${BROKER_CPU_LIMIT_CORES}
      - BROKER_MEMORY_LIMIT=${BROKER_MEMORY_LIMIT}
    cpus: ${BROKER_CPU_LIMIT_CORES}
    mem_limit: ${BROKER_MEMORY_LIMIT}
    volumes:
      - mosquitto-data:/var/lib/mosquitto   # DynSec JSON + persistencia
      - mosquitto-conf:/etc/mosquitto       # mosquitto.conf + conf.d/
      - mosquitto-log:/var/log/mosquitto    # logs (leidos tambien por BHM/clientlogs)
    networks:
      bunkerm-network:
        aliases:
          - bhm-broker
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1900 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ==========================================
  # BHM Frontend — Next.js standalone + nginx reverse proxy
  # Sirve la UI en :2000 y proxea /api/* hacia bhm-api:9001
  # ==========================================
  bhm-frontend:
    image: bhm-frontend:latest
    container_name: bunkerm-frontend
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      bhm-identity:
        condition: service_healthy
      bhm-api:
        condition: service_healthy
    environment:
      # URL interna del API backend (nginx proxea /api/* aqui)
      - BACKEND_URL=http://bhm-api:9001
      # Secretos de sesion Next.js
      - AUTH_SECRET=${AUTH_SECRET}
      # Identity service
      - IDENTITY_API_URL=http://bhm-identity:8080
      - IDENTITY_API_KEY=${API_KEY:-default_api_key_replace_in_production}
      # UI admin credentials — para seed del primer usuario en el arranque
      - ADMIN_INITIAL_EMAIL=${ADMIN_INITIAL_EMAIL:-admin@bhm.local}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-Usuario@1}
      # API key — para auth entre Next.js server-side y bhm-api
      - API_KEY=${API_KEY:-default_api_key_replace_in_production}
      # URLs publicas
      - NEXTAUTH_URL=http://localhost:2000
      - FRONTEND_URL=http://localhost:2000
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      # Timezone
      - TZ=${TZ:-Europe/Madrid}
      - NODE_ENV=production
    ports:
      # UI + APIs accesibles en http://localhost:2000 (nginx interno del contenedor)
      - "2000:2000"
    volumes:
      - bunkerm-logs-nginx:/var/log/nginx
    networks:
      bunkerm-network:
        aliases:
          - bhm-frontend
          - bhm-web
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2000/api/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # BHM API — FastAPI + uvicorn (todos los routers excepto identity)
  # No expone puerto al host (acceso via bhm-frontend nginx)
  # ==========================================
  bhm-api:
    image: bhm-api:latest
    container_name: bunkerm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      # API key compartida
      - API_KEY=${API_KEY:-default_api_key_replace_in_production}
      # MQTT — apunta al contenedor mosquitto standalone en la red interna
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1900
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-Usuario@1}
      - MOSQUITTO_ADMIN_USERNAME=${MQTT_USERNAME:-admin}
      - MOSQUITTO_ADMIN_PASSWORD=${MQTT_PASSWORD:-Usuario@1}
      - MOSQUITTO_IP=mosquitto
      - MOSQUITTO_PORT=1900
      - MOSQUITTO_INTERNAL_HOST=mosquitto
      - MOSQUITTO_INTERNAL_PORT=1901
      # URLs
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - RATE_LIMIT_PER_MINUTE=100
      # Timezone
      - TZ=${TZ:-Europe/Madrid}
      # Logging
      - LOG_LEVEL=INFO
      - API_LOG_FILE=/var/log/api/api_activity.log
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - CLIENT_LOG_PATH=/var/log/api/api_activity.log
      - BROKER_OBSERVABILITY_ENABLED=true
      - BROKER_OBSERVABILITY_URL=http://bhm-broker-observability:9102
      # PostgreSQL
      - DATABASE_URL=${DATABASE_URL}
      - CONTROL_PLANE_DATABASE_URL=${CONTROL_PLANE_DATABASE_URL}
      - HISTORY_DATABASE_URL=${HISTORY_DATABASE_URL}
      - REPORTING_DATABASE_URL=${REPORTING_DATABASE_URL}
      - IDENTITY_DATABASE_URL=${IDENTITY_DATABASE_URL}
      # Paths internos
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      - BROKER_RECONCILE_MODE=daemon
      - BROKER_RECONCILE_WAIT_TIMEOUT_SECONDS=12
      # Notificaciones de Alertas (SMTP)
      - ALERT_NOTIFY_ENABLED=${ALERT_NOTIFY_ENABLED:-false}
      - ALERT_NOTIFY_EMAIL_ENABLED=${ALERT_NOTIFY_EMAIL_ENABLED:-true}
      - ALERT_NOTIFY_EMAIL_TO=${ALERT_NOTIFY_EMAIL_TO:-}
      - ALERT_NOTIFY_EMAIL_FROM=${ALERT_NOTIFY_EMAIL_FROM:-${SMTP_FROM_EMAIL:-}}
      - ALERT_NOTIFY_SMTP_HOST=${ALERT_NOTIFY_SMTP_HOST:-${SMTP_HOST:-}}
      - ALERT_NOTIFY_SMTP_PORT=${ALERT_NOTIFY_SMTP_PORT:-${SMTP_PORT:-587}}
      - ALERT_NOTIFY_SMTP_USERNAME=${ALERT_NOTIFY_SMTP_USERNAME:-${SMTP_USERNAME:-}}
      - ALERT_NOTIFY_SMTP_PASSWORD=${ALERT_NOTIFY_SMTP_PASSWORD:-${SMTP_PASSWORD:-}}
      - ALERT_NOTIFY_SMTP_STARTTLS=${ALERT_NOTIFY_SMTP_STARTTLS:-${SMTP_USE_TLS:-true}}
      - ALERT_NOTIFY_SMTP_SSL=${ALERT_NOTIFY_SMTP_SSL:-false}
      - ALERT_NOTIFY_INLINE_DELIVERY_ENABLED=${ALERT_NOTIFY_INLINE_DELIVERY_ENABLED:-false}
      - MAX_UPLOAD_SIZE=10485760
      - SSL_CERT_PATH=/app/certs/cert.pem
      - SSL_KEY_PATH=/app/certs/key.pem
    volumes:
      - bunkerm-logs-api:/var/log/api
    networks:
      bunkerm-network:
        aliases:
          - bhm-api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9001/api/v1/monitor/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ==========================================
  # BHM Identity Service — standalone identity + credentials (5B-2)
  # ==========================================
  bhm-identity:
    image: bhm-identity:latest
    container_name: bunkerm-identity
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - IDENTITY_DATABASE_URL=${IDENTITY_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY:-default_api_key_replace_in_production}
      - ADMIN_INITIAL_EMAIL=${ADMIN_INITIAL_EMAIL:-admin@bhm.local}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:-Usuario@1}
      - ALLOWED_ORIGINS=*
      - ALLOWED_HOSTS=*
      - TZ=${TZ:-Europe/Madrid}
      - LOG_LEVEL=INFO
    networks:
      bunkerm-network:
        aliases:
          - bhm-identity
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==========================================
  # BHM reconciler - servicio transicional broker-facing
  # Ejecuta el loop de reconciliación fuera del proceso web.
  # ==========================================
  bhm-reconciler:
    image: bhm-api:latest
    container_name: bunkerm-reconciler
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      # Credenciales MQTT para conexion al broker
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1900
      - MQTT_USERNAME=${MQTT_USERNAME:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-Usuario@1}
      - MOSQUITTO_ADMIN_USERNAME=${MQTT_USERNAME:-admin}
      - MOSQUITTO_ADMIN_PASSWORD=${MQTT_PASSWORD:-Usuario@1}
      - MOSQUITTO_IP=mosquitto
      - MOSQUITTO_PORT=1900
      - MOSQUITTO_INTERNAL_HOST=mosquitto
      - MOSQUITTO_INTERNAL_PORT=1901
      # Base de datos — el daemon solo requiere acceso al control-plane y al state store
      - DATABASE_URL=${DATABASE_URL}
      - CONTROL_PLANE_DATABASE_URL=${CONTROL_PLANE_DATABASE_URL}
      - HISTORY_DATABASE_URL=${HISTORY_DATABASE_URL}
      - REPORTING_DATABASE_URL=${REPORTING_DATABASE_URL}
      # Ruta al archivo DynSec del broker (dentro del volumen compartido)
      - DYNSEC_PATH=/var/lib/mosquitto/dynamic-security.json
      # Configuracion general
      - TZ=${TZ:-Europe/Madrid}
      - LOG_LEVEL=INFO
    command:
      - /bin/sh
      - -c
      - /opt/venv/bin/python -m services.broker_reconcile_daemon --interval 5
    volumes:
      - mosquitto-data:/var/lib/mosquitto
      - mosquitto-conf:/etc/mosquitto
    networks:
      bunkerm-network:
        aliases:
          - bhm-reconciler

  # ==========================================
  # Broker observability interno - read-only sobre artefactos del broker
  # ==========================================
  bhm-broker-observability:
    image: bhm-api:latest
    container_name: bunkerm-broker-observability
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - BROKER_LOG_PATH=/var/log/mosquitto/mosquitto.log
      - BROKER_RESOURCE_STATS_PATH=/var/log/mosquitto/broker-resource-stats.json
      - BROKER_LOG_READ_ENABLED=true
      - BROKER_RESOURCE_STATS_FILE_ENABLED=true
    command:
      - /bin/sh
      - -c
      - /opt/venv/bin/uvicorn services.broker_observability_api:app --host 0.0.0.0 --port 9102
    volumes:
      - mosquitto-data:/var/lib/mosquitto:ro
      - mosquitto-conf:/etc/mosquitto:ro
      - mosquitto-log:/var/log/mosquitto:ro
    networks:
      bunkerm-network:
        aliases:
          - bhm-broker-observability
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9102/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==========================================
  # Alert delivery worker - consume outbox persistido
  # ==========================================
  bhm-alert-delivery:
    image: bhm-api:latest
    container_name: bhm-alert-delivery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - API_KEY=${API_KEY:-default_api_key_replace_in_production}
      - TZ=${TZ:-Europe/Madrid}
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - CONTROL_PLANE_DATABASE_URL=${CONTROL_PLANE_DATABASE_URL}
      - ALERT_NOTIFY_ENABLED=${ALERT_NOTIFY_ENABLED:-false}
      - ALERT_NOTIFY_EMAIL_ENABLED=${ALERT_NOTIFY_EMAIL_ENABLED:-true}
      - ALERT_NOTIFY_EMAIL_TO=${ALERT_NOTIFY_EMAIL_TO:-}
      - ALERT_NOTIFY_EMAIL_FROM=${ALERT_NOTIFY_EMAIL_FROM:-${SMTP_FROM_EMAIL:-}}
      - ALERT_NOTIFY_SMTP_HOST=${ALERT_NOTIFY_SMTP_HOST:-${SMTP_HOST:-}}
      - ALERT_NOTIFY_SMTP_PORT=${ALERT_NOTIFY_SMTP_PORT:-${SMTP_PORT:-587}}
      - ALERT_NOTIFY_SMTP_USERNAME=${ALERT_NOTIFY_SMTP_USERNAME:-${SMTP_USERNAME:-}}
      - ALERT_NOTIFY_SMTP_PASSWORD=${ALERT_NOTIFY_SMTP_PASSWORD:-${SMTP_PASSWORD:-}}
      - ALERT_NOTIFY_SMTP_STARTTLS=${ALERT_NOTIFY_SMTP_STARTTLS:-${SMTP_USE_TLS:-true}}
      - ALERT_NOTIFY_SMTP_SSL=${ALERT_NOTIFY_SMTP_SSL:-false}
    command:
      - /bin/sh
      - -c
      - /opt/venv/bin/python -m services.alert_delivery_daemon --interval 5
    volumes:
      - bunkerm-logs-api:/var/log/api

  # ==========================================
  # Nginx Reverse Proxy - DESACTIVADO
  # La plataforma actual ya incluye su propio nginx interno en el puerto 2000.
  # Se reactivara en Fase 3-4 cuando se agreguen microservicios propios.
  # ==========================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: bunkerm-nginx
  #   ...

  # ==========================================
  # pgAdmin (opcional y fuera del flujo normal de deploy)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bunkerm-pgadmin
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      # Named volume para pgAdmin (evita problemas de permisos en Podman rootless)
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - bunkerm-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools  # Solo si se solicita manualmente: docker compose --profile tools up -d pgadmin

networks:
  bunkerm-network:
    name: bunkerm-network
    driver: bridge

volumes:
  # Datos de postgres
  postgres-data:
  pgadmin-data:
  # Datos de los servicios BHM
  bunkerm-logs-api:
  bunkerm-logs-nginx:
  # Volumenes compartidos entre BHM y mosquitto standalone
  mosquitto-data:    # /var/lib/mosquitto — DynSec JSON, persistencia MQTT
  mosquitto-conf:    # /etc/mosquitto     — mosquitto.conf + conf.d/
  mosquitto-log:     # /var/log/mosquitto — logs del broker
