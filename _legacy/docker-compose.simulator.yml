# ============================================================================
# Docker Compose - Greenhouse MQTT Stresser
# ============================================================================
#
# PREREQUISITO: BHM debe estar corriendo (.\deploy.ps1 -Action start)
# Este simulador es un stresser one-shot que genera carga MQTT contra el broker.
#
# Ejecutar con: docker-compose -f docker-compose.simulator.yml --env-file .env.dev up
# O usar: .\simulator.ps1 start
# ============================================================================

services:
  greenhouse-simulator:
    build:
      context: ./greenhouse-simulator/src/Greenhouse.Sensors
      dockerfile: Dockerfile
    container_name: greenhouse-simulator
    restart: "no"
    
    env_file:
      - .env.dev
    environment:
      - MQTT_HOST=bunkerm-platform
      - MQTT_PORT=1900
      - MQTT_AUTH_MODE=shared
      - MQTT_USER=${MQTT_USERNAME}
      - MQTT_PASS=${MQTT_PASSWORD}
      - CLIENTS=50
      - TIMEUNIT=3
      - TIME=10
      - MSGS=100
      - QOS=0
      - RETAIN=false
    
    networks:
      - bunkerm-network
    
    # Nota: No hay depends_on porque BHM debe iniciarse por separado.
    # El contenedor finaliza cuando termina la carga MQTT planificada.

networks:
  bunkerm-network:
    external: true
